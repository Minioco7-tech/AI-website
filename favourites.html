<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIviary — Favourites</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="favourites" class="bg-[#0A0C10] text-white flex flex-col min-h-screen">

  <!-- Header -->
  <header id="header"></header>

  <!-- Main Favourites Grid -->
  <main class="flex-grow pt-24 pb-16 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Breadcrumb Navigation -->
    <nav id="breadcrumb" class="flex flex-wrap text-sm text-gray-400 mt-4 mb-6 bg-transparent">
      <!-- Populated dynamically -->
    </nav>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
      <!-- Left: Page title -->
      <div>
        <p class="text-xs font-semibold tracking-[0.25em] uppercase text-[#38BDF8]/80">
          Your saved tools
        </p>

        <h2 id="categoryTitle" class="text-2xl font-bold mt-2 mb-2 sm:mb-0">
          My Favourites
        </h2>

        <p class="mt-2 text-sm md:text-base text-gray-400 max-w-2xl">
          Models you favourite are saved locally in this browser.
        </p>
      </div>

      <!-- Sort by dropdown and randomise button logic -->
      <div class="flex items-center space-x-4 mt-5 sm:mt-0">
        <!-- Sort Dropdown -->
        <div class="relative">
          <select id="sortBy"
            class="appearance-none px-4 py-2 pr-10 bg-black/40 border border-white/10 text-white text-sm rounded-lg 
                   focus:outline-none focus:ring-2 focus:ring-[#00BFFF] cursor-pointer">
            <option value="relevance">Recently Saved</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
          </select>

          <svg xmlns="http://www.w3.org/2000/svg"
               class="absolute right-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </div>

        <!-- Randomise Button -->
        <button id="randomiseBtn"
          class="px-4 py-2 bg-gradient-to-r from-[#00BFFF] to-blue-400 text-black rounded-lg text-sm font-semibold flex items-center space-x-2 transition hover:scale-105">
          <i data-feather="shuffle" class="w-4 h-4"></i>
          <span>Randomise</span>
        </button>
      </div>
    </div>

    <!-- Model grid load -->
    <div id="modelsGrid" class="grid w-full gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

    <!-- Page numbers -->
    <div id="pagination" class="flex justify-center mt-8 space-x-2"></div>

    <!-- Empty State -->
    <div id="noResults" class="text-center text-gray-300 mt-12 hidden">
      <p class="text-lg text-white font-semibold mb-2">No favourite models yet</p>
      <p class="text-sm text-gray-400 mb-5">
        Click the heart icon on any model card to save it here.
      </p>

      <a href="category.html?category=all" class="btn-primary px-4 py-2 text-sm font-medium">
        Browse all models
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer"></footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/feather-icons"></script>
  <script type="module" src="js/favourites.js"></script>
  <script type="module" src="js/background.js"></script>
  <script type="module" src="js/header.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
